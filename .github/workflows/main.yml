name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-dockerize:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.19'
        
    - name: Build Go app
      working-directory: ./code
      run: go build -v ./...
      
    - name: Build Docker Image
      run: docker build -t somyfish-app:latest -f Dockerfile .
